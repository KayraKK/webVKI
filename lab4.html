<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Список дел</title>
    <link rel="icon" href="https://avatars.mds.yandex.net/i?id=efa23d4dbb1c03e3734afe3fe6e35560_l-3311063-images-thumbs&n=13"/>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 620px;
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #1a1a1a;
            text-align: center;
            font-size: 2.2rem;
            margin: 0 0 24px 0;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }

        input {
            flex: 2 1 260px;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #7c5cf0;
            background: white;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        button[type="submit"] {
            background: #7c5cf0;
            color: white;
            flex: 1 0 auto;
        }

        button[type="submit"]:hover {
            background: #6a4ae0;
        }

        button[type="reset"] {
            background: #f0f0f0;
            color: #4a4a4a;
            flex: 1 0 auto;
        }

        button[type="reset"]:hover {
            background: #e4e4e4;
        }

        .list-container {
            overflow-y: auto;
            max-height: 350px;
            padding-right: 4px;
        }

        ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: #fafafa;
            margin-bottom: 10px;
            border-radius: 20px;
            border: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        li:hover {
            background: #f3f0ff;
            border-color: #d0c5ff;
        }

        li input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #7c5cf0;
            cursor: pointer;
        }

        li span {
            flex: 1;
            font-weight: 500;
            color: #2a2a2a;
        }

        li small {
            color: #888;
            font-size: 0.8rem;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 30px;
            white-space: nowrap;
        }

        li button {
            background: transparent;
            border: 1.5px solid #ddd;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            padding: 0;
            color: #999;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        li button:hover {
            background: #ff5c5c;
            border-color: #ff5c5c;
            color: white;
        }

        .empty-message {
            text-align: center;
            padding: 48px 20px;
            color: #aaa;
            font-size: 1.1rem;
            display: none;
            background: #fafafa;
            border-radius: 24px;
            border: 2px dashed #ddd;
        }

        footer {
            margin-top: 24px;
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            form {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            li {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            li small {
                margin-left: 34px;
            }
        }
    </style>
</head>    
<body>
    <div class="container">
        <h1>Список дел</h1>
        
        <form>
            <input type="text" placeholder="новое дело"/>
            <button type="submit">Создать</button>
            <button type="reset">Очистить</button>
        </form>
        
        <div class="list-container">
            <ol>
                <li>
                    <input type="checkbox" checked/>
                    <span>Погладить кошку</span>
                    <small>14.08.2023</small>
                    <button>✖</button>
                </li>
                <li>
                    <input type="checkbox" checked/>
                    <span>Полить картошку</span>
                    <small>04.05.2022</small>
                    <button>✖</button>
                </li>
                <li>
                    <input type="checkbox" checked/>
                    <span>Сложить в лукошко</span>
                    <small>19.05.2022</small>
                    <button>✖</button>
                </li>
            </ol>
            
            <div class="empty-message">
                Не найдено ни одного дела
            </div>
        </div>
        
        <footer>
            <p>Copyright © 2026</p>
        </footer>
    </div>
</body>
</html>
